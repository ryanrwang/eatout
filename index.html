<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Find restaurants near you on a map. Search by cuisine, price, and more.">
    <title>Eatout</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="styles.css?v=10" />
</head>
<body>
    <div id="main-content">
        <div id="map"></div>
        <div id="filter-bar">
            <div id="filter-primary">
                <div class="filter-pin-dot"></div>
                <div class="cuisine-wrapper">
                    <button type="button" class="cuisine-btn" id="cuisine-toggle"><span class="material-symbols-outlined">fork_spoon</span><span class="filter-label">Any cuisine</span></button>
                    <div class="cuisine-dropdown" id="cuisine-dropdown"></div>
                </div>
                <div class="price-wrapper">
                    <button type="button" class="price-toggle-btn" id="price-toggle"><span class="material-symbols-outlined">paid</span><span class="filter-label">Any price</span></button>
                    <div class="price-dropdown" id="price-dropdown">
                        <div class="price-items">
                            <label class="price-check-label"><input type="checkbox" value="1"> $</label>
                            <label class="price-check-label"><input type="checkbox" value="2"> $$</label>
                            <label class="price-check-label"><input type="checkbox" value="3"> $$$</label>
                            <label class="price-check-label"><input type="checkbox" value="4"> $$$$</label>
                        </div>
                        <div class="price-footer">
                            <button type="button" class="btn-tertiary btn-s price-clear-btn">Clear</button>
                            <button type="button" class="btn-primary btn-s price-apply-btn">Apply</button>
                        </div>
                    </div>
                </div>
                <div class="date-wrapper">
                    <button type="button" class="date-btn" id="date-toggle"><span class="material-symbols-outlined">calendar_today</span><span class="filter-label" id="date-display">Any date</span></button>
                    <input type="hidden" id="filter-date" value="">
                    <div class="date-dropdown" id="date-dropdown"></div>
                </div>
                <div class="time-wrapper">
                    <button type="button" class="time-btn" id="time-toggle"><span class="material-symbols-outlined">pace</span><span class="filter-label">Any time</span></button>
                    <input type="hidden" id="filter-time" value="">
                    <div class="time-dropdown" id="time-dropdown"></div>
                </div>
                <div class="radius-wrapper">
                    <button type="button" class="radius-toggle-btn filter-active" id="radius-toggle"><span class="material-symbols-outlined">adjust</span><span class="filter-label">500m</span></button>
                    <div class="radius-dropdown" id="radius-dropdown">
                        <button type="button" class="radius-opt" data-value="500">500m</button>
                        <button type="button" class="radius-opt" data-value="750">750m</button>
                        <button type="button" class="radius-opt" data-value="1000">1km</button>
                        <button type="button" class="radius-opt" data-value="1500">1.5km</button>
                        <button type="button" class="radius-opt" data-value="2000">2km</button>
                        <button type="button" class="radius-opt" data-value="5000">5km</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="results-panel">
            <div id="bottom-sheet-handle">
                <div class="bs-handle-bar"></div>
                <div class="bs-count" id="bs-count"></div>
            </div>
            <div id="panel-header">
                <span id="panel-count"></span>
                <select id="filter-sort">
                    <option value="best_match">Best Match</option>
                    <option value="rating">Rating</option>
                    <option value="review_count">Review Count</option>
                    <option value="distance">Distance</option>
                </select>
            </div>
            <div class="result-cards" id="result-cards"></div>
            <div class="panel-attribution" id="panel-attribution" style="display:none;">Powered by Google</div>
        </div>
    </div>
    <div id="notification"></div>
    <div id="api-counter"></div>
    <button type="button" id="debug-btn" title="Use mock data instead of real API">Debug</button>
    <script src="app.js?v=10"></script>
</body>
</html>
