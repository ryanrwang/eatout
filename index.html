<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Find restaurants near you on a map. Search by cuisine, price, and more.">
    <title>Eatout</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232563eb'%3E%3Cpath d='M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div id="main-content">
        <div id="map"></div>
        <div id="filter-bar">
            <div id="filter-primary">
                <div class="cuisine-wrapper">
                    <button type="button" class="cuisine-btn" id="cuisine-toggle">Cuisine</button>
                    <div class="cuisine-dropdown" id="cuisine-dropdown"></div>
                </div>
                <div class="price-wrapper">
                    <button type="button" class="price-toggle-btn" id="price-toggle">Price</button>
                    <div class="price-dropdown" id="price-dropdown">
                        <div class="price-range-labels">
                            <span>$</span><span>$$</span><span>$$$</span><span>$$$$</span>
                        </div>
                        <div class="price-range-track" id="price-range-track">
                            <div class="price-range-fill" id="price-range-fill"></div>
                            <div class="price-range-knob" id="price-knob-min" data-knob="min"></div>
                            <div class="price-range-knob" id="price-knob-max" data-knob="max"></div>
                        </div>
                    </div>
                </div>
                <input type="date" id="filter-date">
                <div class="time-wrapper">
                    <button type="button" class="time-btn" id="time-toggle">8:00 PM</button>
                    <input type="hidden" id="filter-time" value="20:00">
                    <div class="time-dropdown" id="time-dropdown"></div>
                </div>
                <div class="radius-wrapper">
                    <button type="button" class="radius-toggle-btn" id="radius-toggle">1km</button>
                    <div class="radius-dropdown" id="radius-dropdown">
                        <button type="button" class="radius-opt" data-value="500">500m</button>
                        <button type="button" class="radius-opt" data-value="1000">1km</button>
                        <button type="button" class="radius-opt" data-value="2000">2km</button>
                        <button type="button" class="radius-opt" data-value="5000">5km</button>
                    </div>
                </div>
                <button type="button" id="search-btn" disabled>Search</button>
            </div>
        </div>
        <div id="results-panel">
            <div id="bottom-sheet-handle">
                <div class="bs-handle-bar"></div>
                <div class="bs-count" id="bs-count"></div>
            </div>
            <div id="panel-header">
                <span id="panel-count"></span>
                <select id="filter-sort">
                    <option value="best_match">Best Match</option>
                    <option value="rating">Rating</option>
                    <option value="review_count">Review Count</option>
                    <option value="distance">Distance</option>
                </select>
            </div>
            <div class="result-cards" id="result-cards"></div>
            <div class="panel-attribution" id="panel-attribution" style="display:none;">Powered by Google</div>
        </div>
    </div>
    <div id="notification"></div>
    <div id="api-counter"></div>
    <button type="button" id="debug-btn" title="Use mock data instead of real API">Debug</button>
    <script src="app.js"></script>
</body>
</html>
